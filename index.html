<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firefox Process Optimizer</title>
  </head>
  <body style="background-color: #050505; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: white; font-family: sans-serif;">
    <div id="root">
      <div style="text-align: center;">
        <div style="width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #F27D26; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.5;">Initializing System Optimizer...</div>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
